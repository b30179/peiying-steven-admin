services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-puiying_steven_dev}
      POSTGRES_USER: ${POSTGRES_USER:-steven_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-placeholder}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steven_dev} -d ${POSTGRES_DB:-puiying_steven_dev}"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
volumes:
  postgres_dev_data:
